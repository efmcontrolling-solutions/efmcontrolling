<style id="password-style">
  body.locked {
    overflow: hidden;
  }

  #password-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999999;
    animation: overlayFade 0.3s ease;
  }

  .password-box {
    background: #ffffff;
    padding: 36px 30px;
    border-radius: 16px;
    text-align: center;
    width: 340px;
    box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    animation: boxPop 0.35s ease;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .password-box h2 {
    margin-bottom: 8px;
    font-size: 22px;
    font-weight: 600;
    color: #111;
  }

  .password-box p {
    margin-bottom: 20px;
    font-size: 14px;
    color: #666;
  }

  .password-box input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s ease;
  }

  .password-box input:focus {
    border-color: #3b97d3;
  }

  .password-box button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #3b97d3, #1a6fa8);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition:
      transform 0.15s ease,
      box-shadow 0.15s ease;
  }

  .password-box button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(59, 151, 211, 0.3);
  }

  .password-box button:active {
    transform: translateY(0);
    box-shadow: none;
  }

  #error-msg {
    color: #ff4d4f;
    margin-top: 10px;
    font-size: 13px;
    min-height: 16px;
  }

  @keyframes boxPop {
    from {
      opacity: 0;
      transform: translateY(20px) scale(0.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  @keyframes overlayFade {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }
</style>

<div id="password-overlay">
  <div class="password-box">
    <h2>Private Access</h2>
    <p>Enter password to continue</p>
    <input type="password" id="password-input" placeholder="Password" />
    <button onclick="checkPassword()">Enter</button>
    <p id="error-msg"></p>
  </div>
</div>

<script>
  const correctPassword = "Freelancer100%registered";

  document.body.classList.add("locked");

  function checkPassword() {
    const input = document.getElementById("password-input").value;
    const error = document.getElementById("error-msg");

    if (input === correctPassword) {
      document.getElementById("password-overlay").style.display = "none";
      document.body.classList.remove("locked");
    } else {
      error.textContent = "Wrong password";
    }
  }
</script>
